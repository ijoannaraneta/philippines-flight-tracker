name: Fetch flight prices

on:
  schedule:
    # Every 2 days at 06:30 UTC. ~15 runs x 4 searches = ~60 SerpAPI searches/month.
    - cron: "30 6 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch prices from SerpAPI
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: npm run fetch

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: price snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

  # Pushes made with GITHUB_TOKEN don't trigger the deploy workflow's push
  # event, so redeploy the dashboard explicitly after fetching.
  deploy:
    needs: fetch
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
